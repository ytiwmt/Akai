name: Akai IPL Check

on:
  schedule:
    - cron: "0 * * * *"   # 1時間ごと
  workflow_dispatch:
  push:
    paths:
      - "check_akai.py"
      - ".github/workflows/akai.yml"

jobs:
  run-check:

    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Python
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install
      # =========================

      - name: Install packages
        run: |
          pip install playwright requests redis

      # =========================
      # Playwright
      # =========================

      - name: Install Chromium
        run: |
          playwright install chrome

      # =========================
      # Run
      # =========================

      - name: Run script
        env:
          WEBHOOK_URL_Akai: ${{ secrets.WEBHOOK_URL_Akai }}
          REDIS_URL_Akai: ${{ secrets.REDIS_URL_Akai }}
        run: |
          python check_akai.py

      # =========================
      # Debug Artifact
      # =========================

      - name: Upload Debug Images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: akai-debug
          path: |
            *.png
