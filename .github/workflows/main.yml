name: Akai IPL Check

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

  push:
    paths:
      - "check_akai.py"
      - ".github/workflows/akai.yml"

jobs:
  run-check:

    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Python
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install packages
      # =========================

      - name: Install packages
        run: |
          pip install playwright requests redis

      # =========================
      # Install Playwright Browsers
      # =========================

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      # =========================
      # Run script
      # =========================

      - name: Run script
        env:
          WEBHOOK_URL_Akai: ${{ secrets.WEBHOOK_URL_Akai }}
          REDIS_URL_Akai: ${{ secrets.REDIS_URL_Akai }}
        run: |
          python check_akai.py

      # =========================
      # Upload Debug Images
      # =========================

      - name: Upload Debug Images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: akai-debug
          path: |
            *.png
