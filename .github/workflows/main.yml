name: Akai Reservation Checker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright requests redis
          playwright install chromium

      - name: Run Checker
        env:
          WEBHOOK_URL_Akai: ${{ secrets.WEBHOOK_URL_Akai }}
          REDIS_URL_Akai: ${{ secrets.REDIS_URL_Akai }}
        run: |
          python check_akai.py
